name: healing_app
description: "A Qi Gong healing workout and meditation app with video lessons, music player, and breathing exercises."
publish_to: 'none'

version: 2.0.2+6

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4

  # Firebase
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_analytics: ^12.1.3

  # Network
  dio: ^5.3.3
  connectivity_plus: ^5.0.1

  # Video Player
  video_player: ^2.7.2
  chewie: ^1.7.1

  # Audio Player
  audioplayers: ^5.2.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.1

  # RevenueCat SDK for in-app purchases and subscriptions
  purchases_flutter: ^10.0.2

  # Environment variables management
  flutter_dotenv: ^5.2.1

  # Ads
  google_mobile_ads: ^7.0.0

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  video_thumbnail: ^0.5.3

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  permission_handler: ^11.0.1

  # Functional Programming
  dartz: ^0.10.1

  # JSON Serialization
  json_annotation: ^4.9.0

  # HTTP for scripts
  http: ^1.1.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

  # Testing
  bloc_test: ^9.1.4
  mocktail: ^1.0.0

  # JSON Serialization
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/audio/music/
    - assets/audio/voice/
    - assets/audio/sounds/
    - assets/lottie/
    - .env

